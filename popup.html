<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1>Laracasts Translator</h1>
      <label class="toggle-switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </header>

    <!-- API Key -->
    <section class="section">
      <label class="label">OpenAI API Key <a href="https://platform.openai.com/api-keys" target="_blank" class="api-key-link">(API key almak için tıklayın)</a></label>
      <div class="api-key-row">
        <input type="password" id="apiKey" placeholder="sk-..." class="input">
        <button id="toggleApiKey" class="btn-icon" title="Göster/Gizle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div id="apiKeyStatus" class="status"></div>
    </section>

    <!-- Altyazı Ayarları -->
    <section class="section">
      <h2 class="section-title">Altyazı Ayarları</h2>

      <div class="setting-row">
        <label>
          <input type="checkbox" id="showOriginal" checked>
          Orijinal altyazıyı göster
        </label>
      </div>

      <div class="setting-row">
        <label>
          <input type="checkbox" id="showTranslation" checked>
          Çeviriyi göster
        </label>
      </div>

      <div class="setting-row">
        <label>
          <input type="checkbox" id="blurOriginal">
          Orijinali bulanıklaştır<span class="help-icon" data-tooltip="Öğrenme modu: orijinal metin bulanık görünür, fare üzerine gelince netleşir.">?</span>
        </label>
      </div>

      <div class="setting-row">
        <label class="label">Yazı boyutu: <span id="fontSizeValue">25</span>px</label>
        <input type="range" id="fontSize" min="18" max="45" value="25" class="range">
      </div>

      <div class="setting-row colors">
        <div>
          <label class="label">Orijinal renk</label>
          <input type="color" id="originalColor" value="#ffffff">
        </div>
        <div>
          <label class="label">Çeviri renk</label>
          <input type="color" id="translationColor" value="#ffd700">
        </div>
      </div>

      <div class="setting-row">
        <label class="label">Arka plan opaklığı: <span id="bgOpacityValue">75</span>%</label>
        <input type="range" id="bgOpacity" min="0" max="100" value="75" class="range">
      </div>
    </section>

    <!-- Varsayılana Sıfırla -->
    <section class="section">
      <button id="resetDefaults" class="btn btn-secondary">Varsayılana Sıfırla</button>
    </section>

    <!-- Cache -->
    <section class="section">
      <h2 class="section-title">Önbellek</h2>
      <div id="cacheStats" class="cache-stats">Yükleniyor...</div>
      <button id="clearCache" class="btn btn-danger">Önbelleği Temizle</button>
    </section>
  </div>

  <script src="lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
